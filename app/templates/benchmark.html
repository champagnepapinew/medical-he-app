{% extends "base.html" %}
{% block content %}
  <h1 class="h5 fw-semibold mb-2">Benchmark</h1>
  <div class="text-muted small mb-3">Porównanie narzutu czasowego: plaintext vs HE (wartości przykładowe).</div>

  <div class="card card-soft bg-white p-3">
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr class="text-muted small">
            <th>Operacja</th><th>Plaintext (ms)</th><th>HE (ms)</th><th>Współczynnik</th>
          </tr>
        </thead>
        <tbody>
          {% for b in bench %}
            <tr>
              <td class="fw-semibold">{{ b.op }}</td>
              <td class="text-muted">{{ b.plaintext_ms }}</td>
              <td class="text-muted">{{ b.he_ms }}</td>
              <td class="text-muted">x{{ b.ratio }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
