{% extends "base.html" %}
{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h1 class="h5 fw-semibold mb-1">Pacjenci</h1>
      <div class="text-muted small">Lista pacjentów (demo). Docelowo dane z bazy.</div>
    </div>
    <form class="d-flex gap-2" method="post" action="/patients">
  <input class="form-control form-control-sm" name="name" placeholder="Imię i nazwisko" required>
  <input class="form-control form-control-sm" name="note" placeholder="Notatka (opcjonalnie)">
  <button class="btn btn-medical btn-sm" type="submit">Dodaj</button>
</form>

  </div>

  <div class="card card-soft bg-white p-3">
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr class="text-muted small">
            <th>ID</th><th>Imię i nazwisko</th><th>PESEL</th><th>Notatka</th>
          </tr>
        </thead>
        <tbody>
          {% for p in patients %}
            <tr>
              <td class="text-muted">{{ p.id }}</td>
              <td class="fw-semibold">{{ p.name }}</td>
              <td class="text-muted">{{ p.pesel }}</td>
              <td class="text-muted">{{ p.note }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
