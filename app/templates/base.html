<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ app_name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
  </head>

  <body class="bg-soft">
    <div class="container-fluid">
      <div class="row min-vh-100">
        <aside class="col-12 col-md-3 col-lg-2 p-0 border-end bg-white">
          <div class="p-3">
            <div class="d-flex align-items-center gap-2">
              <div class="brand-badge">HE</div>
              <div>
                <div class="fw-semibold small">Medical Data</div>
                <div class="text-muted" style="font-size: 12px;">Homomorphic Encryption</div>
              </div>
            </div>
          </div>

          <nav class="px-2 pb-3">
            {% for item in nav %}
              <a class="nav-item d-block px-3 py-2 mb-2 rounded-3 text-decoration-none
                {% if active == item.href %} nav-active {% else %} nav-inactive {% endif %}"
                 href="{{ item.href }}">
                 {{ item.label }}
              </a>
            {% endfor %}
          </nav>
        </aside>

        <main class="col p-0">
          <header class="topbar border-bottom bg-white">
            <div class="d-flex align-items-center justify-content-between px-3 px-md-4" style="height: 56px;">
              <div class="text-muted small">Panel przetwarzania danych medycznych</div>
              <button class="btn btn-medical btn-sm">Nowy pomiar</button>
            </div>
          </header>

          <section class="p-3 p-md-4">
            {% block content %}{% endblock %}
          </section>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
