{% extends "base.html" %}
{% block content %}
  <div class="mb-4">
    <h1 class="h5 fw-semibold mb-1">Dashboard</h1>
    <div class="text-muted small">Podsumowanie danych i ostatnich operacji na zaszyfrowanych pomiarach.</div>
  </div>

  <div class="row g-3 mb-4">
    {% for s in stats %}
      <div class="col-12 col-md-4">
        <div class="card card-soft p-3 bg-white">
          <div class="text-muted small">{{ s.label }}</div>
          <div class="fs-3 fw-semibold mt-1">{{ s.value }}</div>
          <div class="progress mt-3" style="height: 6px;">
            <div class="progress-bar" style="width: 65%; background: var(--medical-600);"></div>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>

  <div class="card card-soft p-3 bg-white">
    <div class="fw-semibold small">Ostatnie zdarzenia</div>
    <ul class="mt-2 mb-0 text-muted small">
      {% for e in events %}
        <li class="mb-1">{{ e }}</li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
